<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMEX | The Super Mario Galaxy Movie</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e62424;
            --primary-glow: rgba(230, 36, 36, 0.6);
            --accent: #ffcc00;
            --dark-bg: #05070a;
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: 
                linear-gradient(rgba(5, 7, 10, 0.6), rgba(5, 7, 10, 0.6)),
                url('https://images.unsplash.com/photo-1464802686167-b939a6910659?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
        }

        nav {
            padding: 1rem 8%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 1.6rem; font-weight: 900; }
        .logo span { color: var(--primary); }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 4rem;
            align-items: center;
        }

        /* --- COLUMNA IZQUIERDA --- */
        .hero-content h1 {
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .promo-img {
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            margin-top: 1.5rem;
        }

        /* --- COLUMNA DERECHA (FORMULARIO + TIMER) --- */
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Timer justo arriba del formulario */
        .timer-card {
            background: rgba(230, 36, 36, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary);
            border-radius: 15px;
            padding: 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .time-item { text-align: center; }
        .time-item span { display: block; font-size: 1.6rem; font-weight: 900; color: var(--accent); line-height: 1; }
        .time-item label { font-size: 0.6rem; text-transform: uppercase; font-weight: 700; opacity: 0.8; }

        /* Tarjeta del Formulario */
        .form-card {
            background: rgba(15, 20, 35, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 2.2rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .form-card h2 { font-size: 1.4rem; text-align: center; letter-spacing: 1px; }

        .progress-section { margin: 1.2rem 0; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 900; color: var(--accent); margin-bottom: 5px; }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 85%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            transition: width 1s;
        }

        /* Inputs */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
        .full { grid-column: span 2; }

        input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            padding: 11px;
            border-radius: 10px;
            color: white;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .cta-button {
            width: 100%;
            margin-top: 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.1rem;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(230, 36, 36, 0.3);
        }

        .cta-button:hover { filter: brightness(1.2); transform: translateY(-2px); }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; text-align: center; }
            .promo-img { max-width: 300px; margin: 1.5rem auto; }
        }
         .footer {
    text-align: center;
    padding: 1.5rem;
    background: rgba(0, 0, 0, 0.8);
    border-top: 1px solid var(--glass-border);
    font-size: 0.75rem;
    opacity: 0.7;
    margin-top: 2rem;
}
    </style>
</head>
<body>

    <nav>
        <div class="logo">CINE<span>MEX</span></div>
        <div style="font-size: 0.7rem; font-weight: 700; opacity: 0.6;">SOPORTE OFICIAL</div>
    </nav>

    <main class="container">
        
        <section class="hero-content">
            <h1>The Super Mario <br><span style="color:var(--accent)">Galaxy</span> Movie</h1>
            <p style="opacity: 0.9; max-width: 450px;">Regístrate para la preventa exclusiva y gana un Luma Kit Edición Especial.</p>
            <img src="mario.png" alt="Poster" class="promo-img">
        </section>

        <section class="form-container">
            
            <div class="timer-card">
                <div style="font-size: 0.6rem; font-weight: 900; letter-spacing: 1px;">OFERTA<br>EXPIRA:</div>
                <div class="time-item"><span id="horas">00</span><label>Horas</label></div>
                <div class="time-item"><span id="minutos">15</span><label>Min</label></div>
                <div class="time-item"><span id="segundos">00</span><label>Seg</label></div>
            </div>

            <div class="form-card">
                <h2>RECLAMA TU KIT</h2>
                
                <div class="progress-section">
                    <div class="progress-text">
                        <span>ESTADO: CASI AGOTADO</span>
                        <span id="txt-lugares">8 LUGARES</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="barra-progreso"></div>
                    </div>
                </div>

                <div class="input-grid">
                    <div class="input-group full"><input type="text" id="nombre" placeholder="Nombre Completo"></div>
                    <div class="input-group"><input type="email" id="correo" placeholder="Email"></div>
                    <div class="input-group"><input type="tel" id="telefono" placeholder="WhatsApp"></div>
                    <div class="input-group"><input type="date" id="fecha"></div>
                    <div class="input-group"><input type="text" id="trabajo" placeholder="Ciudad"></div>
                    <div class="input-group full"><input type="text" id="direccion" placeholder="Dirección de Envío"></div>
                </div>

                <button class="cta-button" onclick="enviarDatos()">RECLAMAR PREMIO</button>
            </div>
        </section>

    </main>

    <script>
        // Timer
        let tiempoTotal = 15 * 60;
        function actualizarContador() {
            let m = Math.floor(tiempoTotal / 60);
            let s = tiempoTotal % 60;
            document.getElementById('minutos').innerText = m.toString().padStart(2, '0');
            document.getElementById('segundos').innerText = s.toString().padStart(2, '0');
            if (tiempoTotal > 0) {
                tiempoTotal--;
                if (tiempoTotal % 45 === 0) {
                    let lugares = Math.floor(Math.random() * 2) + 2;
                    document.getElementById('txt-lugares').innerText = `${lugares} LUGARES`;
                    document.getElementById('barra-progreso').style.width = (lugares * 12) + "%";
                }
            }
        }
        setInterval(actualizarContador, 1000);

        function enviarDatos() {
            const btn = document.querySelector('.cta-button');
            btn.innerText = "REGISTRANDO...";
            btn.disabled = true;
            setTimeout(() => { window.location.href = 'error.html'; }, 1500);
        }
        <footer class="footer">
    <p>© 2026 CINEMEX. Todos los derechos reservados.</p>
    <p>Promoción sujeta a disponibilidad. Términos y condiciones aplican.</p>
</footer>
    </script>
</body>
</html>
